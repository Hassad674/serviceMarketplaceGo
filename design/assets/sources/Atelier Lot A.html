<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atelier — Lot A · Cycle transactionnel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f4f1eb; font-family: 'Inter Tight', system-ui, sans-serif; color: #1a1a1a; }
  * { box-sizing: border-box; }
  .dc-artboard-content { user-select: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script src="phase1/_bootstrap.js"></script>
<script type="text/babel" src="phase1/icons.jsx"></script>
<script type="text/babel" src="phase1/soleil.jsx"></script>
<script type="text/babel" src="phase1/soleil-lotA.jsx"></script>
<script type="text/babel" src="phase1/soleil-mobile.jsx"></script>
<script type="text/babel" src="phase1/soleil-lotA-mobile.jsx"></script>
<script type="text/babel" src="phase1/soleil-jobcreate-mobile.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { SoleilJobsList, SoleilJobDetailDesc, SoleilJobDetailCands, SoleilJobCreate, SoleilProjectDetail, SoleilJobsListMobile, SoleilJobDetailDescMobile, SoleilJobDetailCandsMobile, SoleilJobCreateMobile, SoleilProjectDetailMobile } = window;

  function App() {
    return (
      <DesignCanvas title="Atelier — Lot A" subtitle="Cycle transactionnel entreprise · 5 écrans en direction Soleil v2.">
        <DCSection id="lotA" title="Lot A — Annonces & projets" subtitle="Du publish au paiement final, l'expérience entreprise.">
          <DCArtboard id="jobs-list" label="Mes annonces (liste)" width={1440} height={950}>
            <SoleilJobsList />
          </DCArtboard>
          <DCArtboard id="job-desc" label="Détail annonce · Description" width={1440} height={950}>
            <SoleilJobDetailDesc />
          </DCArtboard>
          <DCArtboard id="job-cands" label="Détail annonce · Candidatures" width={1440} height={1200}>
            <SoleilJobDetailCands />
          </DCArtboard>
          <DCArtboard id="job-create" label="Création d'une annonce" width={1440} height={1480}>
            <SoleilJobCreate />
          </DCArtboard>
          <DCArtboard id="proj-detail" label="Détail projet (stepper + frais)" width={1440} height={1200}>
            <SoleilProjectDetail />
          </DCArtboard>
        </DCSection>
        <DCSection id="lotA-mobile" title="Lot A — mobile" subtitle="Annonces, détail (description + candidatures), détail projet. 390px.">
          <DCArtboard id="jobs-list-m" label="Annonces · mobile" width={390} height={780}>
            <SoleilJobsListMobile />
          </DCArtboard>
          <DCArtboard id="job-desc-m" label="Détail · description" width={390} height={780}>
            <SoleilJobDetailDescMobile />
          </DCArtboard>
          <DCArtboard id="job-cands-m" label="Détail · candidatures" width={390} height={780}>
            <SoleilJobDetailCandsMobile />
          </DCArtboard>
          <DCArtboard id="job-create-m" label="Créer une annonce · mobile" width={390} height={1280}>
            <SoleilJobCreateMobile />
          </DCArtboard>
          <DCArtboard id="proj-detail-m" label="Projet · mobile" width={390} height={780}>
            <SoleilProjectDetailMobile />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
