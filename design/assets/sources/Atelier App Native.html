<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atelier — App native (Phase 1)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Inter+Tight:wght@400..700&family=Geist+Mono:wght@400..600&display=swap" rel="stylesheet" />
<style>
  body { margin: 0; font-family: 'Inter Tight', system-ui, sans-serif; background: #f4ede0; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="design-canvas.jsx" type="text/babel"></script>
<script src="phase1/_bootstrap.js"></script>
<script src="phase1/icons.jsx" type="text/babel"></script>
<script src="phase1/soleil.jsx" type="text/babel"></script>
<script src="phase1/soleil-app.jsx" type="text/babel"></script>

<script type="text/babel" data-presets="react">
  function App() {
    return (
      <DesignCanvas title="Atelier · App native — Phase 1" subtitle="Flutter Material 3, design unifié iOS / Android. 3 écrans pour valider la direction.">
        <DCSection id="brief" title="Brief">
          <DCArtboard id="brief" label="Approche" width={780} height={844}>
            <div style={{ padding: 56, fontFamily: 'Fraunces, serif', height: '100%', background: '#fff', display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 20 }}>
              <div style={{ fontSize: 11, letterSpacing: '0.18em', color: '#7a6850', fontFamily: '"Inter Tight"', fontWeight: 600 }}>PHASE 1 — APP NATIVE</div>
              <h1 style={{ fontSize: 44, fontWeight: 600, letterSpacing: '-0.025em', margin: 0, color: '#2a1f15', lineHeight: 1.05 }}>Soleil, en version application.</h1>
              <p style={{ fontFamily: '"Inter Tight"', fontSize: 16, lineHeight: 1.55, color: '#4a3a26', margin: 0, maxWidth: 580 }}>
                Flutter Material 3, design <strong>unifié iOS et Android</strong> — comme Airbnb ou Linear. On reprend la palette, la typographie et les portraits de Soleil v2, on les adapte aux conventions natives :
              </p>
              <ul style={{ fontFamily: '"Inter Tight"', fontSize: 15, lineHeight: 1.65, color: '#4a3a26', margin: 0, paddingLeft: 20, maxWidth: 580 }}>
                <li>Tab bar bas avec FAB central pour l'action primaire (créer une demande / candidater)</li>
                <li>Headers compacts, large titles éditoriaux à la première ouverture</li>
                <li>Bottom sheets pour filtres et actions (vs sidebar web)</li>
                <li>Pull-to-refresh sur les listes, swipe actions sur les rows</li>
                <li>Status bar gérée par le système, safe areas respectées</li>
              </ul>
              <div style={{ display: 'flex', gap: 16, marginTop: 8, paddingTop: 20, borderTop: '1px solid #f0e6d8' }}>
                <div>
                  <div style={{ fontSize: 10, color: '#a89679', letterSpacing: '0.08em', fontWeight: 600, fontFamily: '"Inter Tight"' }}>FORMAT</div>
                  <div style={{ fontFamily: '"Geist Mono"', fontSize: 13, color: '#2a1f15', marginTop: 3 }}>iPhone 14/15 · 390 × 844</div>
                </div>
                <div>
                  <div style={{ fontSize: 10, color: '#a89679', letterSpacing: '0.08em', fontWeight: 600, fontFamily: '"Inter Tight"' }}>STACK</div>
                  <div style={{ fontFamily: '"Geist Mono"', fontSize: 13, color: '#2a1f15', marginTop: 3 }}>Flutter · Material 3</div>
                </div>
                <div>
                  <div style={{ fontSize: 10, color: '#a89679', letterSpacing: '0.08em', fontWeight: 600, fontFamily: '"Inter Tight"' }}>ÉCRANS</div>
                  <div style={{ fontFamily: '"Geist Mono"', fontSize: 13, color: '#2a1f15', marginTop: 3 }}>3 (validation)</div>
                </div>
              </div>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="screens" title="Écrans Phase 1">
          <DCArtboard id="recherche" label="Recherche freelances" width={390} height={844}>
            <AppRecherche />
          </DCArtboard>
          <DCArtboard id="profil" label="Profil prestataire" width={390} height={844}>
            <AppProfil />
          </DCArtboard>
          <DCArtboard id="messagerie" label="Messagerie · chat" width={390} height={844}>
            <AppMessagerie />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
