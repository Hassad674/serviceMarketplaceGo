<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atelier — Lot B · Cycle freelance argent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f4f1eb; font-family: 'Inter Tight', system-ui, sans-serif; color: #1a1a1a; }
  * { box-sizing: border-box; }
  .dc-artboard-content { user-select: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script src="phase1/_bootstrap.js"></script>
<script type="text/babel" src="phase1/icons.jsx"></script>
<script type="text/babel" src="phase1/soleil.jsx"></script>
<script type="text/babel" src="phase1/soleil-lotB.jsx"></script>
<script type="text/babel" src="phase1/soleil-mobile.jsx"></script>
<script type="text/babel" src="phase1/soleil-lotB-mobile.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { SoleilWallet, SoleilInvoices, SoleilBillingProfile, SoleilWalletMobile, SoleilInvoicesMobile, SoleilBillingProfileMobile, SoleilStripeConnectMobile } = window;

  function App() {
    return (
      <DesignCanvas title="Atelier — Lot B" subtitle="Cycle freelance · argent. Strict alignement sur l'app existante, polish Soleil v2.">
        <DCSection id="lotB" title="Lot B — Argent côté prestataire" subtitle="Mêmes éléments que l'app, identité visuelle Soleil v2.">
          <DCArtboard id="wallet" label="Portefeuille" width={1440} height={1100}>
            <SoleilWallet />
          </DCArtboard>
          <DCArtboard id="invoices" label="Factures (mois en cours + archives)" width={1440} height={1100}>
            <SoleilInvoices />
          </DCArtboard>
          <DCArtboard id="billing" label="Profil de facturation" width={1440} height={1500}>
            <SoleilBillingProfile />
          </DCArtboard>
        </DCSection>
        <DCSection id="lotB-mobile" title="Lot B — mobile" subtitle="Wallet, factures, profil de facturation, Stripe Connect. 390px.">
          <DCArtboard id="wallet-m" label="Wallet · mobile" width={390} height={780}>
            <SoleilWalletMobile />
          </DCArtboard>
          <DCArtboard id="invoices-m" label="Factures · mobile" width={390} height={780}>
            <SoleilInvoicesMobile />
          </DCArtboard>
          <DCArtboard id="billing-m" label="Profil facturation · mobile" width={390} height={780}>
            <SoleilBillingProfileMobile />
          </DCArtboard>
          <DCArtboard id="stripe-m" label="Stripe Connect · mobile" width={390} height={780}>
            <SoleilStripeConnectMobile />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
