<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atelier — Lot E · Onboarding & compte</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f4f1eb; font-family: 'Inter Tight', system-ui, sans-serif; color: #1a1a1a; }
  * { box-sizing: border-box; }
  .dc-artboard-content { user-select: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script src="phase1/_bootstrap.js"></script>
<script type="text/babel" src="phase1/icons.jsx"></script>
<script type="text/babel" src="phase1/soleil.jsx"></script>
<script type="text/babel" src="phase1/soleil-lotE.jsx"></script>
<script type="text/babel" src="phase1/soleil-mobile.jsx"></script>
<script type="text/babel" src="phase1/soleil-lotE-mobile.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const {
    SoleilLogin,
    SoleilSignupRole,
    SoleilSignupFreelance,
    SoleilSignupCompany,
    SoleilStripeConnect,
    SoleilAccount,
    SoleilLoginMobile,
    SoleilSignupMobile,
    SoleilCompteMobile,
  } = window;

  function App() {
    return (
      <DesignCanvas title="Atelier — Lot E" subtitle="Onboarding, auth & compte. Du premier login à la configuration des paiements.">
        <DCSection id="auth" title="Auth & onboarding" subtitle="Plein écran, pas de chrome de l'app — c'est un sas, on prend le temps.">
          <DCArtboard id="login" label="Login" width={1440} height={900}>
            <SoleilLogin />
          </DCArtboard>
          <DCArtboard id="signup-role" label="Sign up · choix de rôle" width={1440} height={900}>
            <SoleilSignupRole />
          </DCArtboard>
          <DCArtboard id="signup-freelance" label="Sign up · formulaire freelance" width={1440} height={1180}>
            <SoleilSignupFreelance />
          </DCArtboard>
          <DCArtboard id="signup-company" label="Sign up · formulaire entreprise" width={1440} height={1100}>
            <SoleilSignupCompany />
          </DCArtboard>
        </DCSection>
        <DCSection id="payments" title="Paiements & compte" subtitle="Stripe Connect (deux états) + page Compte.">
          <DCArtboard id="stripe-connect" label="Stripe Connect · initial + urgent" width={1440} height={1200}>
            <SoleilStripeConnect />
          </DCArtboard>
          <DCArtboard id="account" label="Compte" width={1440} height={1500}>
            <SoleilAccount />
          </DCArtboard>
        </DCSection>
        <DCSection id="mobile" title="Responsive — mobile" subtitle="Vues navigateur mobile, viewport 390px. Pas une app native, juste le site sur petit écran.">
          <DCArtboard id="login-m" label="Login · mobile" width={390} height={780}>
            <SoleilLoginMobile />
          </DCArtboard>
          <DCArtboard id="signup-m" label="Sign up · mobile" width={390} height={780}>
            <SoleilSignupMobile />
          </DCArtboard>
          <DCArtboard id="compte-m" label="Compte · mobile" width={390} height={780}>
            <SoleilCompteMobile />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
