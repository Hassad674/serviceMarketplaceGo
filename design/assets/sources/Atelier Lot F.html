<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atelier — Lot F · Messagerie & Équipe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f4f1eb; font-family: 'Inter Tight', system-ui, sans-serif; color: #1a1a1a; }
  * { box-sizing: border-box; }
  .dc-artboard-content { user-select: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script src="phase1/_bootstrap.js"></script>
<script type="text/babel" src="phase1/icons.jsx"></script>
<script type="text/babel" src="phase1/soleil.jsx"></script>
<script type="text/babel" src="phase1/soleil-mobile.jsx"></script>
<script type="text/babel" src="phase1/soleil-lotF.jsx"></script>
<script type="text/babel" src="phase1/soleil-lotF-mobile.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const {
    SoleilMessagerie,
    SoleilTeam,
    SoleilMessagerieListMobile,
    SoleilMessagerieThreadMobile,
    SoleilTeamMobile,
  } = window;

  function App() {
    return (
      <DesignCanvas title="Atelier — Lot F" subtitle="Messagerie + Équipe. Deux écrans complets desktop + mobile, basés sur l'organisation existante de l'app, habillés à l'identité Soleil.">

        <DCSection id="msg" title="Messagerie" subtitle="3 colonnes desktop : nav app · liste des convs · conversation. Dans la conversation : composer, propositions inline, événements de mission, CTA évaluation.">
          <DCArtboard id="msg-desktop" label="Messagerie · desktop" width={1440} height={900}>
            <SoleilMessagerie />
          </DCArtboard>
        </DCSection>

        <DCSection id="team" title="Équipe" subtitle="Membres, rôles, permissions par tab, propriétaire verrouillé, invitations en attente, transfert de propriété. Identique au flow actuel — juste habillé.">
          <DCArtboard id="team-desktop" label="Équipe · desktop" width={1440} height={2200}>
            <SoleilTeam />
          </DCArtboard>
        </DCSection>

        <DCSection id="msg-mobile" title="Messagerie — mobile" subtitle="Liste puis thread. Bottom bar pour la nav primaire, hamburger top-right pour le reste.">
          <DCArtboard id="msg-list-m" label="Liste des conversations" width={390} height={780}>
            <SoleilMessagerieListMobile />
          </DCArtboard>
          <DCArtboard id="msg-thread-m" label="Conversation active" width={390} height={780}>
            <SoleilMessagerieThreadMobile />
          </DCArtboard>
        </DCSection>

        <DCSection id="team-mobile" title="Équipe — mobile" subtitle="Même contenu que desktop, organisé en sections empilées. Toggles, accordéons, et panneau owner-only en bas de page.">
          <DCArtboard id="team-m" label="Équipe · mobile" width={390} height={780}>
            <SoleilTeamMobile />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
