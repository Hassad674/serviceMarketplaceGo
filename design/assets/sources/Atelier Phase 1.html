<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atelier — Phase 1 : 3 directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,400&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f4f1eb; font-family: 'Inter Tight', system-ui, sans-serif; color: #1a1a1a; }
  * { box-sizing: border-box; }
  /* Disable text selection drag inside artboards while panning */
  .dc-artboard-content { user-select: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script src="phase1/_bootstrap.js"></script>
<script type="text/babel" src="phase1/icons.jsx"></script>
<script type="text/babel" src="phase1/intro.jsx"></script>
<script type="text/babel" src="phase1/maison-shell.jsx"></script>
<script type="text/babel" src="phase1/maison-screens.jsx"></script>
<script type="text/babel" src="phase1/soleil.jsx"></script>
<script type="text/babel" src="phase1/place.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { Intro } = window;
  const { MaisonDashboard, MaisonFind, MaisonProfile, MaisonMessages } = window;
  const { SoleilDashboard, SoleilFind, SoleilProfile, SoleilMessages } = window;
  const { PlaceDashboard, PlaceFind, PlaceProfile, PlaceMessages } = window;

  function App() {
    return (
      <DesignCanvas title="Atelier — Phase 1" subtitle="3 directions × 4 écrans clés. Choisis-en une, on la décline ensuite sur toutes les pages.">
        <DCSection id="intro" title="00 — Brief" subtitle="Le contexte avant de plonger">
          <DCArtboard id="brief" label="Brief & système" width={1280} height={900}>
            <Intro />
          </DCArtboard>
        </DCSection>

        <DCSection id="maison" title="01 — Atelier Maison" subtitle="Stripe-like. Structuré, ivoire + accent indigo profond. La plus safe et la plus 'fintech sérieuse'.">
          <DCArtboard id="maison-dash" label="Dashboard" width={1440} height={900}>
            <MaisonDashboard />
          </DCArtboard>
          <DCArtboard id="maison-find" label="Find Freelancers" width={1440} height={1100}>
            <MaisonFind />
          </DCArtboard>
          <DCArtboard id="maison-profile" label="Profil prestataire" width={1440} height={1400}>
            <MaisonProfile />
          </DCArtboard>
          <DCArtboard id="maison-msg" label="Messages + proposal" width={1440} height={900}>
            <MaisonMessages />
          </DCArtboard>
        </DCSection>

        <DCSection id="soleil" title="02 — Atelier Soleil" subtitle="Airbnb-warm. Humain, photo-driven, palette corail/sable, plus chaleureux et accessible. Pour viser large.">
          <DCArtboard id="soleil-dash" label="Dashboard" width={1440} height={900}>
            <SoleilDashboard />
          </DCArtboard>
          <DCArtboard id="soleil-find" label="Find Freelancers" width={1440} height={1100}>
            <SoleilFind />
          </DCArtboard>
          <DCArtboard id="soleil-profile" label="Profil prestataire" width={1440} height={1400}>
            <SoleilProfile />
          </DCArtboard>
          <DCArtboard id="soleil-msg" label="Messages + proposal" width={1440} height={900}>
            <SoleilMessages />
          </DCArtboard>
        </DCSection>

        <DCSection id="place" title="03 — Atelier Place" subtitle="Upwork-like. Marketplace dense, accent rose retravaillé (le tien, en mieux), badges, données. Pour assumer le côté marketplace pro.">
          <DCArtboard id="place-dash" label="Dashboard" width={1440} height={900}>
            <PlaceDashboard />
          </DCArtboard>
          <DCArtboard id="place-find" label="Find Freelancers" width={1440} height={1100}>
            <PlaceFind />
          </DCArtboard>
          <DCArtboard id="place-profile" label="Profil prestataire" width={1440} height={1400}>
            <PlaceProfile />
          </DCArtboard>
          <DCArtboard id="place-msg" label="Messages + proposal" width={1440} height={900}>
            <PlaceMessages />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
