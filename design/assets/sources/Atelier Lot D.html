<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atelier — Lot D · Profil prestataire</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f4f1eb; font-family: 'Inter Tight', system-ui, sans-serif; color: #1a1a1a; }
  * { box-sizing: border-box; }
  .dc-artboard-content { user-select: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script src="phase1/_bootstrap.js"></script>
<script type="text/babel" src="phase1/icons.jsx"></script>
<script type="text/babel" src="phase1/soleil.jsx"></script>
<script type="text/babel" src="phase1/soleil-lotD.jsx"></script>
<script type="text/babel" src="phase1/soleil-mobile.jsx"></script>
<script type="text/babel" src="phase1/soleil-lotD-mobile.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { SoleilProfile, SoleilProfileMobile } = window;

  function App() {
    return (
      <DesignCanvas title="Atelier — Lot D" subtitle="Profil prestataire. Page unique, sections empilées. Côté freelance : crayon par section pour éditer en place. Côté entreprise : lecture + bouton message sticky.">
        <DCSection id="profile" title="Profil prestataire" subtitle="Même structure pour les deux vues. Le crayon n'apparaît qu'en mode privé.">
          <DCArtboard id="profile-public" label="Vue publique · côté entreprise" width={1280} height={3000}>
            <SoleilProfile isPrivate={false} />
          </DCArtboard>
          <DCArtboard id="profile-private" label="Vue privée · édition côté freelance" width={1280} height={3100}>
            <SoleilProfile isPrivate={true} />
          </DCArtboard>
        </DCSection>
        <DCSection id="profile-mobile" title="Profil — mobile" subtitle="Même structure, viewport 390px. Vue publique avec CTA sticky, vue privée avec crayons et complétion.">
          <DCArtboard id="profile-public-m" label="Vue publique · mobile" width={390} height={780}>
            <SoleilProfileMobile isPrivate={false} />
          </DCArtboard>
          <DCArtboard id="profile-private-m" label="Vue privée · mobile" width={390} height={780}>
            <SoleilProfileMobile isPrivate={true} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
