name: marketplace_mobile
description: B2B Marketplace - Mobile Application
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  google_fonts: ^6.2.1
  url_launcher: ^6.2.3
  video_player: ^2.8.6
  chewie: ^1.8.1
  share_plus: ^7.2.1
  web_socket_channel: ^3.0.1
  livekit_client: ^2.3.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  record: ^5.1.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.2
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  # H2/M4: production crash reporting. Captures uncaught Dart errors,
  # uncaught Flutter framework errors, and isolate errors and forwards
  # them to Firebase Crashlytics in release builds. In debug builds,
  # the same hooks log to the console only — no upload to Crashlytics.
  firebase_crashlytics: ^4.3.10
  flutter_local_notifications: ^18.0.1
  flutter_inappwebview: ^6.1.5
  uuid: ^4.3.3
  posthog_flutter: ^5.24.2
  # Legal docs rendering (mobile parity with web /legal/* — D4).
  # Pinned exactly (no caret) so a transitive bump cannot silently
  # change the markdown render. Bump only with a deliberate review of
  # the legal screens — the renderer is the only consumer in the app.
  flutter_markdown: 0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  mockito: ^5.4.4
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  generate: true
  assets:
    # Legal long-form documents (RGPD art. 30/35/28, CGU, CGV…). Source
    # of truth lives in /legal/*.md at the repo root; the mobile copy
    # is bundled here so the screens can load it via rootBundle without
    # needing a network roundtrip. Update both copies when a document
    # changes.
    - assets/legal/
  fonts:
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMono-Regular.otf
          weight: 400
        - asset: assets/fonts/GeistMono-Medium.otf
          weight: 500

dependency_overrides:
  record_linux: ^1.0.0
  analyzer_plugin: ^0.13.0

