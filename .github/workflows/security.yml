# Weekly + on-PR security scans.
#
# PR triggers are scoped to dependency / lockfile changes — running a
# full trivy scan on every doc PR would be wasteful. Weekly cron catches
# newly-disclosed CVEs for dependencies we have not touched.
name: Security

on:
  pull_request:
    paths:
      - "backend/go.mod"
      - "backend/go.sum"
      - "web/package.json"
      - "web/package-lock.json"
      - "mobile/pubspec.yaml"
      - "mobile/pubspec.lock"
      - ".github/workflows/security.yml"
  push:
    branches:
      - main
    paths:
      - "backend/go.mod"
      - "backend/go.sum"
      - "web/package.json"
      - "web/package-lock.json"
      - "mobile/pubspec.yaml"
      - "mobile/pubspec.lock"
  schedule:
    # Every Monday 06:00 UTC — catches CVEs disclosed over the weekend.
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions: read-all

jobs:
  # -----------------------------------------------------------------
  # Backend: gosec (static) + govulncheck (CVE DB) + trivy (deps)
  # -----------------------------------------------------------------
  backend-gosec:
    name: backend / gosec
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      - name: install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: run gosec
        working-directory: backend
        # Excluded rules (documented in docs/ops.md):
        #   G304 — file inclusion via variable (false positives on
        #          migrations directory walk)
        #   G404 — non-crypto RNG in tests/fixtures
        run: |
          gosec -no-fail -fmt sarif -out gosec.sarif -exclude=G304,G404 ./... || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: backend/gosec.sarif
          category: gosec

  backend-trivy:
    name: backend / trivy (deps + image)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: trivy fs (go.sum)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: backend
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0" # upload always, gate in separate step
      - name: trivy image (if Dockerfile exists)
        if: hashFiles('backend/Dockerfile') != ''
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: backend/Dockerfile
          format: sarif
          output: trivy-dockerfile.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-fs.sarif') != ''
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # -----------------------------------------------------------------
  # Web: npm audit (high severity hard-fails)
  # -----------------------------------------------------------------
  web-npm-audit:
    name: web / npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: npm audit (advisory)
        continue-on-error: true
        # Dependabot PRs are the authoritative signal; this job is a
        # weekly safety net. Pre-existing advisories in transitive deps
        # would otherwise block unrelated PRs.
        run: npm audit --audit-level=high || true

  # -----------------------------------------------------------------
  # Mobile: pub outdated — informational only, never blocks the build.
  # -----------------------------------------------------------------
  mobile-pub-outdated:
    name: mobile / pub outdated (advisory)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.5"
          channel: stable
          cache: true
      - run: flutter pub get
      - name: pub outdated
        continue-on-error: true
        # Informational: never fails the build.
        run: flutter pub outdated --mode=null-safety || true
