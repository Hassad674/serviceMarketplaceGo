services:
  postgres:
    image: postgres:16-alpine
    container_name: marketplace-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace_go
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: marketplace-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  dbgate:
    image: dbgate/dbgate
    container_name: marketplace-dbgate
    ports:
      - "8085:3000"
    environment:
      CONNECTIONS: con1
      LABEL_con1: Marketplace Local
      SERVER_con1: postgres
      USER_con1: postgres
      PASSWORD_con1: postgres
      PORT_con1: 5432
      DATABASE_con1: marketplace_go
      ENGINE_con1: postgres@dbgate-plugin-postgres
    depends_on:
      - postgres
    restart: unless-stopped

  typesense:
    image: typesense/typesense:28.0
    container_name: marketplace-typesense
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    command: >
      --data-dir /data
      --api-key=xyz-dev-master-key-change-in-production
      --enable-cors
      --cors-domains=http://localhost:3001,http://localhost:3002,http://localhost:5173
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8108/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  typesense_data:
